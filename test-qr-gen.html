<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test — Générateur QR Codes</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: linear-gradient(145deg, #1E3A8A 0%, #1E40AF 40%, #0EA5E9 100%);
  min-height: 100vh;
  color: #fff;
  padding: 24px 16px;
}
h1 { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
.sub { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 24px; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
  max-width: 900px;
  margin: 0 auto;
}

.card {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 18px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  text-align: center;
}

.avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 18px;
  flex-shrink: 0;
}

.tech-name { font-size: 13px; font-weight: 800; color: #fff; line-height: 1.3; }
.tech-centre { font-size: 11px; color: rgba(255,255,255,0.45); }
.tech-code { font-family: monospace; font-size: 15px; font-weight: 800; background: rgba(255,255,255,0.12); padding: 2px 10px; border-radius: 8px; }

.qr-img {
  width: 130px; height: 130px;
  border-radius: 10px;
  background: #fff;
  padding: 6px;
}

.btn-wa {
  width: 100%;
  padding: 10px;
  background: #25D366;
  border: none; border-radius: 10px;
  color: #fff; font-size: 13px; font-weight: 800;
  cursor: pointer; font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  text-decoration: none;
}
.btn-wa:active { opacity: 0.85; }
</style>
</head>
<body>

<div style="max-width:900px;margin:0 auto;">
  <h1>📲 QR Codes Techniciens</h1>
  <p class="sub">Appuie sur "WhatsApp" pour envoyer le QR au technicien</p>
  <div class="grid" id="grid"></div>
</div>

<script>
const TECHS = [
  {nom:"Sunam Uddin",      code:"1980", centre:"Aeroville A", color:"#60A5FA"},
  {nom:"Khalid Faris",     code:"1004", centre:"Aeroville B", color:"#34D399"},
  {nom:"Siraj Uddin",      code:"1006", centre:"Lafayette",   color:"#FBBF24"},
  {nom:"Chabane Messaoudene", code:"1007", centre:"Parly2",   color:"#C084FC"},
  {nom:"Iqbal Hussain",    code:"1013", centre:"Aeroville A", color:"#34D399"},
  {nom:"Hakima Faris",     code:"1014", centre:"Belleville",  color:"#22D3EE"},
];

const grid = document.getElementById('grid');

TECHS.forEach(t => {
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${t.code}&margin=4`;
  // Lien WhatsApp : ouvre WhatsApp avec un message + l'URL de l'image QR
  const msg = encodeURIComponent(`Bonjour ${t.nom.split(' ')[0]} 👋\nVoici ton QR code Dreamwash :\n${qrUrl}\n\nEnregistre-le dans ta galerie photo pour badger à la tablette.`);
  const waLink = `https://wa.me/?text=${msg}`;

  grid.innerHTML += `
    <div class="card">
      <div class="avatar" style="background:${t.color}33;color:${t.color};">${t.nom.charAt(0)}</div>
      <div>
        <div class="tech-name">${t.nom}</div>
        <div class="tech-centre">📍 ${t.centre}</div>
      </div>
      <img class="qr-img" src="${qrUrl}" alt="QR ${t.nom}">
      <div class="tech-code">${t.code}</div>
      <a class="btn-wa" href="${waLink}" target="_blank">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Envoyer WhatsApp
      </a>
    </div>
  `;
});
</script>
</body>
</html>
