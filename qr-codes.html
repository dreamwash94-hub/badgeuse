<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreamwash — QR Codes Techniciens</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: linear-gradient(145deg, #1E3A8A 0%, #1E40AF 40%, #0EA5E9 100%);
  min-height: 100vh;
  color: #fff;
  padding: 24px 16px 40px;
}
.header {
  display: flex; align-items: center; justify-content: space-between;
  max-width: 960px; margin: 0 auto 28px;
  flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 42px; height: 42px;
  background: rgba(255,255,255,0.2); border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; border: 1px solid rgba(255,255,255,0.3);
}
h1 { font-size: 20px; font-weight: 900; }
.sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
.btn-back {
  padding: 9px 18px;
  background: rgba(255,255,255,0.1);
  border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  color: rgba(255,255,255,0.7);
  font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: inherit;
  text-decoration: none; display: inline-block;
}
.search-bar {
  max-width: 960px; margin: 0 auto 20px;
}
.search-bar input {
  width: 100%; padding: 12px 16px;
  background: rgba(255,255,255,0.1);
  border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  color: #fff; font-size: 14px; font-family: inherit;
  outline: none;
}
.search-bar input::placeholder { color: rgba(255,255,255,0.4); }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
  max-width: 960px;
  margin: 0 auto;
}
.card {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 18px 14px;
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
  text-align: center;
}
.avatar {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 18px;
}
.tech-name { font-size: 13px; font-weight: 800; color: #fff; line-height: 1.3; }
.tech-meta { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 2px; }
.qr-img {
  width: 134px; height: 134px;
  border-radius: 10px;
  background: #fff; padding: 6px;
  display: block;
}
.tech-code {
  font-family: monospace; font-size: 15px; font-weight: 800;
  background: rgba(255,255,255,0.12); padding: 2px 12px; border-radius: 8px;
}
.btn-wa {
  width: 100%; padding: 10px;
  background: #25D366; border: none; border-radius: 10px;
  color: #fff; font-size: 13px; font-weight: 800;
  cursor: pointer; font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  text-decoration: none;
}
.loading {
  max-width: 960px; margin: 60px auto;
  text-align: center; color: rgba(255,255,255,0.5); font-size: 15px;
}
.count-lbl {
  max-width: 960px; margin: 0 auto 14px;
  font-size: 12px; color: rgba(255,255,255,0.4); font-weight: 600;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-icon">💧</div>
    <div>
      <h1>QR Codes Techniciens</h1>
      <div class="sub">Envoyez le QR code à chaque technicien via WhatsApp</div>
    </div>
  </div>
  <a class="btn-back" href="./">← Retour badgeuse</a>
</div>

<div class="search-bar">
  <input type="text" id="search" placeholder="🔍 Rechercher un technicien…" oninput="filterCards()">
</div>

<div class="count-lbl" id="count-lbl"></div>
<div class="grid" id="grid"><div class="loading">⏳ Chargement des techniciens…</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyCSZqfL3G-DK0VzNmptblT7F_kgq5R4Oww",
  authDomain:"dreamwash-d4a2c.firebaseapp.com",
  projectId:"dreamwash-d4a2c",
  storageBucket:"dreamwash-d4a2c.firebasestorage.app",
  messagingSenderId:"294836515742",
  appId:"1:294836515742:web:3fdbe1b28db8f97b7cdc8f"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allTechs = [];

function qrUrl(code) {
  return `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${code}&margin=4`;
}

function waLink(tech) {
  const msg = encodeURIComponent(
    `Bonjour ${tech.nom.split(' ')[0]} 👋\n\n` +
    `Voici ton QR code Dreamwash pour badger à la tablette.\n\n` +
    `🔗 Ouvre ce lien et fais une capture d'écran :\n${qrUrl(tech.code)}\n\n` +
    `Garde la photo dans ta galerie, tu n'en auras plus besoin qu'une fois 😊`
  );
  return `https://wa.me/?text=${msg}`;
}

function renderCard(t) {
  return `
    <div class="card" data-nom="${t.nom.toLowerCase()}">
      <div class="avatar" style="background:${t.color}33;color:${t.color};">${t.nom.charAt(0)}</div>
      <div>
        <div class="tech-name">${t.nom}</div>
        <div class="tech-meta">📍 ${t.centre}${t.poste ? ' · ' + t.poste : ''}</div>
      </div>
      <img class="qr-img" src="${qrUrl(t.code)}" alt="QR ${t.nom}" loading="lazy">
      <div class="tech-code">${t.code}</div>
      <a class="btn-wa" href="${waLink(t)}" target="_blank">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Envoyer WhatsApp
      </a>
    </div>`;
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.card').forEach(c => {
    c.style.display = c.dataset.nom.includes(q) ? '' : 'none';
  });
}
window.filterCards = filterCards;

async function load() {
  try {
    const snap = await getDoc(doc(db, 'portail', 'techs'));
    if (snap.exists()) {
      const data = JSON.parse(snap.data().data);
      allTechs = data.filter(t => !t.statut || t.statut === 'actif')
        .map(t => ({ nom:t.nom, code:t.code||'0000', centre:t.centre||'', color:t.color||'#60A5FA', poste:t.poste||'' }));
    }
  } catch(e) {}

  if (allTechs.length === 0) {
    document.getElementById('grid').innerHTML = '<div class="loading">❌ Impossible de charger les techniciens.</div>';
    return;
  }

  document.getElementById('count-lbl').textContent = `${allTechs.length} techniciens`;
  document.getElementById('grid').innerHTML = allTechs.map(renderCard).join('');
}

load();
</script>
</body>
</html>
